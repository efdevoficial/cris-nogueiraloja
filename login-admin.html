<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Cris Nogueira</title>

    <link rel="stylesheet" href="./css/admin-login.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-container">

        <section class="login-card">

            <img src="./assets/Cris Logo.jpeg" alt="Cris Nogueira">

            <h1>Área Administrativa</h1>

            <p>
                Acesse para gerenciar produtos, estoque e catálogo da loja.
            </p>

            <form id="adminLoginForm">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Digite o email" required>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="Digite a senha" required>
                </div>

                <button type="submit">
                    Entrar
                </button>

            </form>

            <a href="./index.html" class="back-link">
                Voltar para o site
            </a>

        </section>

    </main>

    <script src="./js/admin-auth.js"></script>

</body>
</html>
